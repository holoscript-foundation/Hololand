# Prometheus Configuration for Brittney Cloud API

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'brittney-production'
    environment: 'prod'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Brittney Cloud API
  - job_name: 'brittney-cloud-api'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - brittney-prod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: brittney-cloud-api
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  # Brittney Inference Pods
  - job_name: 'brittney-inference'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - brittney-prod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: brittney-inference
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  # Node exporter
  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*):10250'
        replacement: '${1}:9100'
        target_label: __address__

  # GPU metrics (NVIDIA DCGM exporter)
  - job_name: 'gpu-metrics'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - brittney-prod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: dcgm-exporter
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
