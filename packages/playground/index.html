<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloScript Playground - Build 3D Worlds in Real-Time</title>
  <meta name="description" content="Build 3D worlds in real-time with HoloScript and AI agents" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden;
      background: #0f0f1a;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    
    #holo-root {
      width: 100%;
      height: 100%;
    }
    
    /* Loading state */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #00d4ff;
      z-index: 1000;
    }
    
    #loading h1 {
      font-size: 2em;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00d4ff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    #loading .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid #1a1a2e;
      border-top: 3px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    
    /* VR button */
    #vr-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff, #0088cc);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
      display: none;
    }
    
    #vr-button:hover {
      transform: scale(1.05);
    }

    /* Load button */
    #load-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
    }

    #load-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #00d4ff;
      color: #00d4ff;
    }

    #ide-btn {
      position: fixed;
      top: 20px;
      right: 180px;
      padding: 10px 20px;
      background: rgba(0, 122, 204, 0.3);
      border: 1px solid rgba(0, 122, 204, 0.5);
      border-radius: 8px;
      color: #00d4ff;
      font-size: 14px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    #ide-btn:hover {
      background: rgba(0, 122, 204, 0.5);
      border-color: #00d4ff;
      color: #fff;
    }

    #studio-btn {
      position: fixed;
      top: 20px;
      right: 340px;
      padding: 10px 20px;
      background: rgba(255, 215, 0, 0.2);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 8px;
      color: #ffd700;
      font-size: 14px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    #studio-btn:hover {
      background: rgba(255, 215, 0, 0.4);
      border-color: #ffd700;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>HoloScript Playground</h1>
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #666;">Loading runtime...</p>
  </div>
  
  <div id="holo-root"></div>
  
  <a id="studio-btn" href="creator-studio.html" title="Open HoloLand Creator Studio">&#9733; Creator Studio</a>
  <a id="ide-btn" href="ide.html" title="Open HoloScript IDE with Monaco Editor">&#9998; Open IDE</a>
  <input type="file" id="scene-loader" accept=".holo,.hsplus" style="display:none">
  <button id="load-btn">Load Scene</button>
  <button id="vr-button">Enter VR</button>
  
  <!-- HoloScript Runtime (Three.js bundled inside) -->
  <script>
    // Try to load runtime from various locations
    (function() {
      const sources = [
        './holoscript.global.global.js',  // local copy in playground folder
        './node_modules/@holoscript/runtime/dist/holoscript.global.global.js',
        '../../../HoloScript/packages/runtime/dist/holoscript.global.global.js', 
        '/holoscript.global.global.js', // for production builds
      ];
      
      let loaded = false;
      
      function tryLoad(index) {
        if (index >= sources.length || loaded) {
          if (!loaded) {
            console.log('Using fallback minimal runtime');
            window.HoloScript = createMinimalHoloScript();
          }
          return;
        }
        
        const script = document.createElement('script');
        script.src = sources[index];
        script.onload = function() {
          if (window.HoloScript && window.HoloScript.createRuntime) {
            console.log('✓ HoloScript runtime loaded from:', sources[index]);
            loaded = true;
          } else {
            // Global bundle exports everything at top level
            if (window.createRuntime) {
              window.HoloScript = { createRuntime: window.createRuntime };
              console.log('✓ HoloScript runtime loaded from:', sources[index]);
              loaded = true;
            } else {
              tryLoad(index + 1);
            }
          }
        };
        script.onerror = function() {
          console.log('× Failed to load:', sources[index]);
          tryLoad(index + 1);
        };
        document.head.appendChild(script);
      }
      
      tryLoad(0);
      
      function createMinimalHoloScript() {
        return {
          version: '2.1.0-fallback',
          createRuntime: function(config) {
            console.log('HoloScript fallback runtime initializing...', config);
            return createMinimalRuntime(config);
          }
        };
      }
    })();
    
    // Minimal runtime for when full runtime isn't available
    function createMinimalRuntime(config) {
      // Show error state
      config.container.innerHTML = '<div style="color:#ff6666;padding:40px;text-align:center;"><h2>HoloScript Runtime Failed to Load</h2><p>Please check the browser console for errors.</p><p style="font-size:12px;color:#888;">Try refreshing the page or check the network tab.</p></div>';
      document.getElementById('loading')?.classList.add('hidden');
      
      return {
        load: function(source) { console.log('Minimal runtime - load called'); },
        start: function() { console.log('Minimal runtime started'); },
        stop: function() {},
        supportsVR: function() { return false; },
        dispose: function() {}
      };
    }
  </script>
  
  <!-- Bootstrap the playground from playground.holo -->
  <script>
    (function() {
      function initPlayground() {
        if (!window.HoloScript) {
          console.log('Waiting for HoloScript runtime...');
          setTimeout(initPlayground, 100);
          return;
        }
        
        const runtime = HoloScript.createRuntime({
          container: document.getElementById('holo-root'),
          mode: 'web',
          features: {
            monaco: true,
            brittney: true,
            networking: true,
            xr: true
          }
        });
        
        fetch('./playground.holo')
          .then(r => r.text())
          .then(code => {
            runtime.load(code);
            runtime.start();
            document.getElementById('loading').classList.add('hidden');
            
            if (runtime.supportsVR()) {
              const vrButton = document.getElementById('vr-button');
              vrButton.style.display = 'block';
              vrButton.onclick = () => runtime.enterVR();
            }
          })
          .catch(err => {
            console.error('Failed to load playground.holo:', err);
            runtime.load(`
              composition "HoloScript Playground" {
                environment { theme: "developer-dark", grid: true }
                object "WelcomeText" {
                  position: [0, 1.6, -2]
                  type: "ui-text"
                  text: "Welcome to HoloScript Playground"
                  color: "#00d4ff"
                }
              }
            `);
            runtime.start();
            document.getElementById('loading').classList.add('hidden');
          });

        // Scene Loader Logic
        const loadBtn = document.getElementById('load-btn');
        const fileInput = document.getElementById('scene-loader');

        loadBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (event) => {
            const content = event.target.result;
            console.log('Loading scene:', file.name);
            
            // Show loading
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            loading.querySelector('p').textContent = `Loading ${file.name}...`;

            // Reset runtime if needed, or just load new code
            // Note: In a real app we might want to dispose/recreate to clear state
            // For now, we utilize runtime.load() which presumably handles replacement or addition
            try {
              runtime.stop(); // Stop loop
              // Ideally runtime.clear() or similar? Assuming load() replaces or adds.
              // If load() adds, we might have duplicate scenes. 
              // But runtime interface usually implies loading a "world".
              
              runtime.load(content);
              runtime.start();
              
              setTimeout(() => {
                loading.classList.add('hidden');
                loading.querySelector('p').textContent = 'Loading runtime...';
              }, 500);
            } catch (err) {
              console.error('Failed to load scene:', err);
              alert('Error loading scene: ' + err.message);
              loading.classList.add('hidden');
            }
          };
          reader.readAsText(file);
        };
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPlayground);
      } else {
        initPlayground();
      }
    })();
  </script>
</body>
</html>
