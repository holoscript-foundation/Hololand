version: '3.8'

# Docker Compose for SNN Perception Demo Production Deployment
# Includes: app, monitoring, and load balancing

services:
  # ============================================================================
  # Main Application
  # ============================================================================
  snn-perception:
    build:
      context: ../../../..
      dockerfile: packages/platform/demos/snn-perception-deploy/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-2026-03-08T00:00:00Z}
        VCS_REF: ${VCS_REF:-unknown}
        VERSION: ${VERSION:-1.0.0}
    image: hololand/snn-perception-demo:${VERSION:-latest}
    container_name: snn-perception-demo
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - snn-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.hololand.service=snn-perception-demo"
      - "com.hololand.version=${VERSION:-1.0.0}"

  # ============================================================================
  # Prometheus (Monitoring)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: snn-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - snn-network
    depends_on:
      - snn-perception
    labels:
      - "com.hololand.service=prometheus"

  # ============================================================================
  # Grafana (Dashboards)
  # ============================================================================
  grafana:
    image: grafana/grafana:10.0.0
    container_name: snn-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.hololand.io
    networks:
      - snn-network
    depends_on:
      - prometheus
    labels:
      - "com.hololand.service=grafana"

  # ============================================================================
  # Node Exporter (System Metrics)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: snn-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - snn-network
    labels:
      - "com.hololand.service=node-exporter"

  # ============================================================================
  # Nginx Exporter (Nginx Metrics)
  # ============================================================================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: snn-nginx-exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://snn-perception:80/metrics'
    networks:
      - snn-network
    depends_on:
      - snn-perception
    labels:
      - "com.hololand.service=nginx-exporter"

  # ============================================================================
  # Alertmanager (Alerts)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: snn-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - snn-network
    labels:
      - "com.hololand.service=alertmanager"

# ============================================================================
# Networks
# ============================================================================
networks:
  snn-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
