# Prometheus Configuration for SNN Perception Demo Monitoring
# Scrapes metrics from nginx, node exporter, and custom application metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'snn-perception-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Prometheus self-monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================================
  # SNN Perception Demo Application (via nginx stub_status)
  # ============================================================================
  - job_name: 'snn-perception-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['snn-perception:80']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'snn-perception-demo'

  # ============================================================================
  # Nginx Exporter (detailed nginx metrics)
  # ============================================================================
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nginx'

  # ============================================================================
  # Node Exporter (system metrics)
  # ============================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host-system'

  # ============================================================================
  # Custom SNN Inference Metrics (if exposed)
  # ============================================================================
  - job_name: 'snn-inference-metrics'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['snn-perception:80']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'snn-inference'
    # Scrape less frequently for inference metrics (30s)
    scrape_interval: 30s
