<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030712">
    <title>HoloLand - Geospatial AR Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f1f5f9;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        .stat {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.8);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .status-warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fde047;
        }

        .anchor-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .anchor-item {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .anchor-info {
            flex: 1;
        }

        .anchor-label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .anchor-coords {
            font-size: 12px;
            color: #94a3b8;
        }

        .anchor-distance {
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
        }

        .platform-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .platform-arkit {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }

        .platform-arcore {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .platform-webxr {
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(96, 165, 250, 0.2);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Geospatial AR Demo</h1>
            <p class="subtitle">Persistent AR content at GPS locations</p>
        </header>

        <!-- Status -->
        <div id="status" class="status status-warning">
            <div id="status-text">Initializing...</div>
        </div>

        <!-- Platform Info -->
        <div class="card">
            <div class="card-title">Platform Capabilities</div>
            <div class="stat-grid">
                <div class="stat">
                    <div class="stat-label">Platform</div>
                    <div class="stat-value" id="platform">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Geospatial</div>
                    <div class="stat-value" id="geospatial-support">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">VPS Available</div>
                    <div class="stat-value" id="vps-support">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracy">-</div>
                </div>
            </div>
        </div>

        <!-- Current Position -->
        <div class="card">
            <div class="card-title">📍 Current Location</div>
            <div class="stat-grid">
                <div class="stat">
                    <div class="stat-label">Latitude</div>
                    <div class="stat-value" id="latitude">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Longitude</div>
                    <div class="stat-value" id="longitude">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Altitude</div>
                    <div class="stat-value" id="altitude">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Session</div>
                    <div class="stat-value" id="session-state">-</div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="card">
            <div class="card-title">Actions</div>
            <button id="init-btn" class="btn btn-primary">Initialize AR Session</button>
            <button id="create-anchor-btn" class="btn btn-primary" disabled>📍 Create Anchor Here</button>
            <button id="fetch-nearby-btn" class="btn btn-secondary" disabled>🔍 Find Nearby Anchors</button>
        </div>

        <!-- Anchors -->
        <div class="card">
            <div class="card-title">Nearby Anchors (<span id="anchor-count">0</span>)</div>
            <div id="anchor-list" class="anchor-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📍</div>
                    <div>No anchors nearby</div>
                    <div style="font-size: 12px; margin-top: 8px;">Create your first anchor above</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./demo.ts"></script>
</body>
</html>
