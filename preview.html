<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HoloScript+ Infinite Evolution Preview</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #fff;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #444;
        backdrop-filter: blur(10px);
        max-width: 300px;
      }
      h1 {
        margin: 0;
        font-size: 1.2rem;
        color: #9c27b0;
      }
      p {
        font-size: 0.9rem;
        color: #ccc;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: #4caf50;
        border-radius: 50%;
        box-shadow: 0 0 10px #4caf50;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>Infinite Evolution</h1>
      <p>HoloScript+ Neural Bridge Active</p>
      <div class="status">
        <div class="dot"></div>
        AIAssistant Connected
      </div>
    </div>
    <div id="container"></div>
    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

      // Simple 3D Scene to simulate HS+ Runtime output
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('container').appendChild(renderer.domElement);

      // AIAssistant Object (The Neural Orb)
      const geometry = new THREE.IcosahedronGeometry(1, 15);
      const material = new THREE.MeshPhongMaterial({
        color: 0x9c27b0,
        wireframe: true,
        emissive: 0x4a148c,
        emissiveIntensity: 0.5,
        transparent: true,
        opacity: 0.8,
      });
      const orb = new THREE.Mesh(geometry, material);
      scene.add(orb);

      // Inner glowing core
      const coreGeo = new THREE.SphereGeometry(0.5, 32, 32);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const core = new THREE.Mesh(coreGeo, coreMat);
      scene.add(core);

      const light = new THREE.PointLight(0xff00ff, 2, 100);
      light.position.set(2, 2, 2);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x222222));

      camera.position.z = 5;

      // Animation Loop - Simulating HOSL reactive traits
      function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        orb.rotation.y += 0.01;
        orb.rotation.z += 0.005;

        // Pulsing effect
        const s = 1 + Math.sin(time * 2) * 0.1;
        orb.scale.set(s, s, s);
        core.scale.set(1 - s * 0.1, 1 - s * 0.1, 1 - s * 0.1);

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
