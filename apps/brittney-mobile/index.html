<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Brittney AI</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --text-primary: #e8e8ff;
      --text-secondary: #8888aa;
      --accent: #00d4ff;
      --accent-glow: rgba(0, 212, 255, 0.3);
      /* Safe area insets for notched devices */
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      /* Handle safe areas */
      padding-top: var(--sat);
      padding-bottom: var(--sab);
      padding-left: var(--sal);
      padding-right: var(--sar);
    }
    
    header {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    
    .title {
      flex: 1;
    }
    
    .title h1 {
      font-size: 17px;
      font-weight: 600;
    }
    
    .title p {
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #44cc44;
      animation: pulse 2s infinite;
    }
    
    .status-dot.loading {
      background: #ffaa00;
    }
    
    .status-dot.error {
      background: #ff4444;
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .settings-btn {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #brittney-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .loading-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }
    
    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(0, 212, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
    }
    
    .progress-bar {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }
    
    /* Quick actions bar for mobile */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .quick-actions::-webkit-scrollbar {
      display: none;
    }
    
    .quick-action {
      flex-shrink: 0;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }
    
    .quick-action:active {
      background: rgba(0, 212, 255, 0.2);
      border-color: var(--accent);
    }
    
    /* Settings modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 10000;
      padding-bottom: var(--sab);
    }
    
    .modal-content {
      background: var(--bg-secondary);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .modal-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    
    .modal-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .setting-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-label {
      font-size: 15px;
    }
    
    .setting-value {
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">B</div>
    <div class="title">
      <h1>Brittney AI</h1>
      <p>HoloScript Assistant</p>
    </div>
    <div class="status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Loading...</span>
    </div>
    <button class="settings-btn" id="settings-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </button>
  </header>
  
  <main>
    <div class="quick-actions" id="quick-actions">
      <button class="quick-action">🌍 New World</button>
      <button class="quick-action">🤖 Create Agent</button>
      <button class="quick-action">📋 Templates</button>
      <button class="quick-action">❓ Help</button>
    </div>
    
    <div id="brittney-chat">
      <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loading-text">Loading Brittney AI...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>
  </main>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
