packages:
  - packages/adapters/*
  - packages/ar/*
  - packages/brittney/*
  - packages/platform/*
  - packages/devtools/*
  - examples/*

# LOCAL DEVELOPMENT ONLY
# These overrides redirect @holoscript/* packages to the local HoloScript repo.
# For production builds, comment these out to use npm-published versions.
# Requires: HoloScript repo cloned at ../HoloScript
overrides:
  '@holoscript/core': link:../HoloScript/packages/core
  '@holoscript/runtime': link:../HoloScript/packages/runtime
  '@holoscript/cli': link:../HoloScript/packages/cli
  '@holoscript/linter': link:../HoloScript/packages/linter
  '@holoscript/formatter': link:../HoloScript/packages/formatter
  '@holoscript/lsp': link:../HoloScript/packages/lsp
  '@holoscript/std': link:../HoloScript/packages/std
  '@holoscript/fs': link:../HoloScript/packages/fs
  '@holoscript/network': link:../HoloScript/packages/network
