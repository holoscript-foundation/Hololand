<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hololand Legends - 2D RPG Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
    }
    
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }
    
    /* Touch controls overlay */
    #touch-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      display: none;
      pointer-events: none;
    }
    
    @media (max-width: 768px) {
      #touch-controls {
        display: flex;
      }
    }
    
    .d-pad {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 120px;
      height: 120px;
      pointer-events: auto;
    }
    
    .action-buttons {
      position: absolute;
      right: 20px;
      bottom: 20px;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    
    .action-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.5);
      color: white;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 1000;
    }
    
    .loading-title {
      font-size: 24px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 0 #0f3460;
    }
    
    .loading-bar {
      width: 200px;
      height: 20px;
      border: 2px solid #e94560;
      border-radius: 10px;
      overflow: hidden;
    }
    
    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div class="loading-title">HOLOLAND LEGENDS</div>
    <div class="loading-bar">
      <div class="loading-fill" id="loading-fill"></div>
    </div>
  </div>
  
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  
  <div id="touch-controls">
    <div class="d-pad" id="dpad"></div>
    <div class="action-buttons">
      <button class="action-btn" id="btn-a">A</button>
      <button class="action-btn" id="btn-b">B</button>
    </div>
  </div>
  
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
