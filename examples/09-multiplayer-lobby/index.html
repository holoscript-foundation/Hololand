<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hololand Multiplayer Lobby - Phase 3 Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    #app {
      display: flex;
      min-height: 100vh;
    }
    #sidebar {
      width: 320px;
      background: rgba(26, 26, 46, 0.95);
      border-right: 1px solid rgba(99, 102, 241, 0.3);
      display: flex;
      flex-direction: column;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #room-view {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #room-canvas {
      width: 100%;
      height: 100%;
    }
    #chat-container {
      height: 200px;
      background: rgba(26, 26, 46, 0.95);
      border-top: 1px solid rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <canvas id="ui-canvas"></canvas>
    </div>
    <div id="main">
      <div id="room-view">
        <canvas id="room-canvas"></canvas>
      </div>
      <div id="chat-container">
        <canvas id="chat-canvas"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
