<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hololand Desktop App - Phase 2 Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="ui-canvas" width="1000" height="700"></canvas>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
