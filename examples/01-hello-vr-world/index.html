<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello VR World - Hololand Example</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 300px;
      backdrop-filter: blur(10px);
    }
    #info h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #4fc3f7;
    }
    #info p {
      margin: 5px 0;
      line-height: 1.6;
    }
    .success {
      color: #4caf50;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="info">
    <h1>🥽 Hello VR World!</h1>
    <p>This is your first Hololand VR world.</p>
    <p><strong>Controls:</strong></p>
    <ul style="margin: 10px 0; padding-left: 20px;">
      <li>Mouse: Rotate view</li>
      <li>Scroll: Zoom</li>
      <li>Right-click: Pan</li>
    </ul>
    <p class="success">✅ VR Button will appear for VR headsets</p>
  </div>

  <canvas id="canvas"></canvas>

  <script type="module">
    // This example uses CDN imports for simplicity
    // In production, use npm packages

    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/webxr/VRButton.js';

    // Note: In a real app, you would import from @hololand packages:
    // import { HololandWorld } from '@hololand/world';
    // import { HololandRenderer } from '@hololand/renderer';

    console.log('🥽 Hello VR World - Starting...');

    // Setup scene
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Setup camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    // Setup renderer
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.xr.enabled = true;

    // Add VR button
    document.body.appendChild(VRButton.createButton(renderer));

    // Setup controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Add lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    scene.add(directionalLight);

    // Add ground
    const groundGeometry = new THREE.PlaneGeometry(20, 20);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x2c3e50,
      roughness: 0.8,
      metalness: 0.2,
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Add "Hello VR" text using boxes
    function createLetter(x, z, color) {
      const geometry = new THREE.BoxGeometry(1, 2, 0.2);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.3,
        metalness: 0.7,
      });
      const box = new THREE.Mesh(geometry, material);
      box.position.set(x, 1, z);
      box.castShadow = true;
      return box;
    }

    // H
    scene.add(createLetter(-6, 0, 0xff4444));
    // E
    scene.add(createLetter(-4, 0, 0xff8844));
    // L
    scene.add(createLetter(-2, 0, 0xffcc44));
    // L
    scene.add(createLetter(0, 0, 0x44ff44));
    // O
    scene.add(createLetter(2, 0, 0x4444ff));

    // VR text
    scene.add(createLetter(5, 0, 0xff44ff));
    scene.add(createLetter(7, 0, 0x44ffff));

    // Add floating sphere
    const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
    const sphereMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x4fc3f7,
      emissiveIntensity: 0.5,
      roughness: 0.2,
      metalness: 0.8,
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.set(0, 3, 0);
    sphere.castShadow = true;
    scene.add(sphere);

    // Animate
    let time = 0;
    function animate() {
      renderer.setAnimationLoop(() => {
        time += 0.01;

        // Animate sphere
        sphere.position.y = 3 + Math.sin(time) * 0.5;
        sphere.rotation.y = time;

        controls.update();
        renderer.render(scene, camera);
      });
    }

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();

    console.log('✅ Hello VR World - Ready!');
    console.log('💡 Try clicking the VR button if you have a headset!');
  </script>
</body>
</html>
