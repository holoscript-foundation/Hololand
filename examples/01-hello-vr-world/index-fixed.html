<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello VR World - Hololand Example</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 300px;
      z-index: 100;
    }
    #info h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #4fc3f7;
    }
    .success { color: #4caf50; font-weight: bold; }
  </style>
  
  <!-- Import Three.js via importmap for better compatibility -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">
    <h1>🥽 Hello VR World!</h1>
    <p>This is your first Hololand VR world.</p>
    <p><strong>Controls:</strong></p>
    <ul style="margin: 10px 0; padding-left: 20px;">
      <li>Mouse: Rotate view</li>
      <li>Scroll: Zoom</li>
      <li>Right-click: Pan</li>
    </ul>
    <p class="success">✅ 3D Scene Loading...</p>
    <p id="status"></p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    console.log('🥽 Hello VR World - Starting...');
    document.getElementById('status').textContent = '🔄 Initializing Three.js...';

    // Setup scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Setup camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(5, 5, 10);
    camera.lookAt(0, 0, 0);

    // Setup renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Setup controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Add lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    // Add ground
    const groundGeometry = new THREE.PlaneGeometry(30, 30);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x2c3e50,
      roughness: 0.8,
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Add grid for visual reference
    const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x333333);
    scene.add(gridHelper);

    // Create colorful boxes spelling "HELLO VR"
    const colors = [0xff4444, 0xff8844, 0xffcc44, 0x44ff44, 0x4444ff, 0xff44ff, 0x44ffff, 0xffffff];
    const letters = ['H', 'E', 'L', 'L', 'O', ' ', 'V', 'R'];
    
    letters.forEach((letter, i) => {
      if (letter === ' ') return;
      
      const geometry = new THREE.BoxGeometry(1.2, 2.5, 0.5);
      const material = new THREE.MeshStandardMaterial({
        color: colors[i],
        roughness: 0.3,
        metalness: 0.7,
      });
      const box = new THREE.Mesh(geometry, material);
      box.position.set((i - 3.5) * 1.8, 1.25, 0);
      box.castShadow = true;
      scene.add(box);
    });

    // Add floating glowing sphere
    const sphereGeometry = new THREE.SphereGeometry(0.8, 32, 32);
    const sphereMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x4fc3f7,
      emissiveIntensity: 0.8,
      roughness: 0.1,
      metalness: 0.9,
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.set(0, 4, 0);
    sphere.castShadow = true;
    scene.add(sphere);

    // Add some floating rings around sphere
    for (let i = 0; i < 3; i++) {
      const ringGeometry = new THREE.TorusGeometry(1.5 + i * 0.3, 0.05, 16, 100);
      const ringMaterial = new THREE.MeshStandardMaterial({
        color: 0x4fc3f7,
        emissive: 0x4fc3f7,
        emissiveIntensity: 0.5,
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.position.set(0, 4, 0);
      ring.rotation.x = Math.PI / 2 + i * 0.3;
      ring.userData = { rotationSpeed: 0.02 + i * 0.01 };
      scene.add(ring);
    }

    document.getElementById('status').textContent = '✅ Scene ready!';
    document.querySelector('.success').textContent = '✅ 3D Scene Active!';

    // Animate
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;

      // Animate sphere (bob up and down)
      sphere.position.y = 4 + Math.sin(time * 2) * 0.5;
      sphere.rotation.y += 0.01;

      // Animate rings
      scene.children.forEach(child => {
        if (child.userData?.rotationSpeed) {
          child.rotation.z += child.userData.rotationSpeed;
        }
      });

      controls.update();
      renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start animation
    animate();

    console.log('✅ Hello VR World - Ready!');
  </script>
</body>
</html>
