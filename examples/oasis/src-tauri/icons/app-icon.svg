<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#5DADE2"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9CCC65"/>
      <stop offset="100%" style="stop-color:#7CB342"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="380" cy="120" r="50" fill="url(#sun)"/>

  <!-- Sun rays -->
  <g fill="#FFD54F" opacity="0.6">
    <rect x="370" y="50" width="20" height="30" rx="10"/>
    <rect x="430" y="100" width="30" height="20" rx="10"/>
    <rect x="410" y="60" width="20" height="20" rx="10" transform="rotate(45 420 70)"/>
  </g>

  <!-- Rolling hills (background) -->
  <ellipse cx="150" cy="380" rx="180" ry="60" fill="#558B2F"/>
  <ellipse cx="380" cy="400" rx="160" ry="50" fill="#689F38"/>

  <!-- Main grass ground -->
  <ellipse cx="256" cy="420" rx="220" ry="80" fill="url(#grass)"/>

  <!-- Oasis palm tree -->
  <g>
    <!-- Trunk -->
    <path d="M256 420 Q250 350 260 280" stroke="#8B4513" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Palm leaves -->
    <g fill="#2E7D32">
      <ellipse cx="260" cy="250" rx="60" ry="20" transform="rotate(-30 260 250)"/>
      <ellipse cx="260" cy="250" rx="60" ry="20" transform="rotate(30 260 250)"/>
      <ellipse cx="260" cy="250" rx="55" ry="18" transform="rotate(-60 260 250)"/>
      <ellipse cx="260" cy="250" rx="55" ry="18" transform="rotate(60 260 250)"/>
      <ellipse cx="260" cy="240" rx="50" ry="16" transform="rotate(0 260 240)"/>
    </g>
  </g>

  <!-- Water pond -->
  <ellipse cx="256" cy="380" rx="70" ry="25" fill="#4FC3F7" opacity="0.8"/>
  <ellipse cx="256" cy="375" rx="50" ry="15" fill="#81D4FA" opacity="0.6"/>

  <!-- Small clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="100" cy="100" rx="40" ry="25"/>
    <ellipse cx="130" cy="95" rx="30" ry="20"/>
    <ellipse cx="70" cy="95" rx="25" ry="18"/>
  </g>

  <!-- H letter subtle watermark -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#3D2914" opacity="0.3">OASIS</text>
</svg>
