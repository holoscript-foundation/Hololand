<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hololand - Universal Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #renderCanvas {
            z-index: 1;
        }
        #uiCanvas {
            z-index: 2;
            pointer-events: auto; /* Ensure UI gets events */
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            z-index: 3;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="renderCanvas"></canvas>
        <canvas id="uiCanvas"></canvas>
        <div class="instructions">
            <strong>Universal Dashboard</strong><br>
            • Test Mouse/Touch/VR interactions<br>
            • Switch between Kid and Pro modes<br>
            • Watch the AI Voice Visualizer
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
