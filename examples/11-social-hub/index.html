<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hololand - Social Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .app {
      display: grid;
      grid-template-columns: 350px 1fr 350px;
      grid-template-rows: 70px 1fr;
      height: 100vh;
      gap: 1px;
      background: #2a2a4a;
    }

    .header {
      grid-column: 1 / -1;
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      border-bottom: 1px solid #3a3a5a;
    }

    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      border: 2px solid #4ade80;
    }

    .user-info {
      text-align: right;
    }

    .user-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .user-status {
      font-size: 0.8rem;
      color: #4ade80;
    }

    /* Friends Panel */
    .friends-panel {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 1.1rem;
      color: #fff;
    }

    .panel-header .count {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
    }

    .search-box {
      padding: 15px 20px;
      border-bottom: 1px solid #2a2a4a;
    }

    .search-input {
      width: 100%;
      padding: 10px 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .friend-tabs {
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid #2a2a4a;
    }

    .friend-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .friend-tab:hover {
      color: #ccc;
    }

    .friend-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .friend-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .friend-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .friend-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
    }

    .friend-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
    }

    .friend-avatar .status-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #1a1a2e;
    }

    .status-dot.online { background: #4ade80; }
    .status-dot.away { background: #fbbf24; }
    .status-dot.busy { background: #ef4444; }
    .status-dot.offline { background: #666; }

    .friend-info {
      flex: 1;
      min-width: 0;
    }

    .friend-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .friend-status-text {
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .friend-actions {
      display: flex;
      gap: 5px;
    }

    .friend-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ccc;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .friend-action-btn:hover {
      background: rgba(102, 126, 234, 0.3);
      color: #fff;
    }

    /* Main Content */
    .main-content {
      background: #0f0f1f;
      display: flex;
      flex-direction: column;
      padding: 25px;
      overflow-y: auto;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .view-all-btn {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-size: 0.85rem;
    }

    /* Party Section */
    .party-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .party-card {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
    }

    .party-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
    }

    .party-card.active {
      border-color: #4ade80;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(102, 126, 234, 0.1));
    }

    .party-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .party-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .party-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .party-badge.public { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .party-badge.private { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .party-badge.invite { background: rgba(102, 126, 234, 0.2); color: #667eea; }

    .party-members {
      display: flex;
      margin-bottom: 15px;
    }

    .party-member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-left: -8px;
      border: 2px solid #0f0f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .party-member-avatar:first-child {
      margin-left: 0;
    }

    .party-member-count {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      margin-left: -8px;
      border: 2px solid #0f0f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .party-activity {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 15px;
    }

    .party-actions {
      display: flex;
      gap: 10px;
    }

    .party-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .party-btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .party-btn.primary:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .party-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }

    .party-btn.secondary:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Emote Grid */
    .emote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
    }

    .emote-btn {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .emote-btn:hover {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
      transform: scale(1.1);
    }

    .emote-btn.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .emote-icon {
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .emote-name {
      font-size: 0.7rem;
      color: #888;
    }

    /* Notifications Panel */
    .notifications-panel {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .notification-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .notification-card {
      display: flex;
      gap: 12px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .notification-card:hover {
      background: rgba(255,255,255,0.06);
    }

    .notification-card.unread {
      border-left-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .notification-card.friend_request { border-left-color: #4ade80; }
    .notification-card.party_invite { border-left-color: #f093fb; }
    .notification-card.achievement { border-left-color: #fbbf24; }
    .notification-card.system { border-left-color: #667eea; }

    .notification-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .notification-icon.friend_request { background: rgba(74, 222, 128, 0.2); }
    .notification-icon.party_invite { background: rgba(240, 147, 251, 0.2); }
    .notification-icon.achievement { background: rgba(251, 191, 36, 0.2); }
    .notification-icon.system { background: rgba(102, 126, 234, 0.2); }

    .notification-content {
      flex: 1;
      min-width: 0;
    }

    .notification-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 3px;
    }

    .notification-message {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }

    .notification-time {
      font-size: 0.7rem;
      color: #555;
    }

    .notification-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .notif-action-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .notif-action-btn.accept {
      background: #4ade80;
      color: #000;
    }

    .notif-action-btn.decline {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }

    /* Status Settings */
    .status-section {
      padding: 20px;
      border-top: 1px solid #2a2a4a;
    }

    .status-options {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .status-option {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .status-option:hover {
      background: rgba(255,255,255,0.1);
    }

    .status-option.active {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    .status-option .icon {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 5px;
    }

    .status-option .label {
      font-size: 0.75rem;
      color: #888;
    }

    .status-message-input {
      width: 100%;
      padding: 10px 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
    }

    .status-message-input:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Create Party Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 450px;
      animation: modalIn 0.3s ease-out;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .modal-field {
      margin-bottom: 20px;
    }

    .modal-field label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
    }

    .modal-field input,
    .modal-field select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
    }

    .modal-field input:focus,
    .modal-field select:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .modal-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Social Hub</h1>
      <div class="user-profile">
        <div class="user-info">
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-status" id="user-status-text">Online</div>
        </div>
        <div class="user-avatar" id="user-avatar">?</div>
      </div>
    </header>

    <!-- Friends Panel -->
    <aside class="friends-panel">
      <div class="panel-header">
        <h2>Friends</h2>
        <span class="count" id="friend-count">0</span>
      </div>
      <div class="search-box">
        <input type="text" class="search-input" id="friend-search" placeholder="Search friends..." />
      </div>
      <div class="friend-tabs">
        <button class="friend-tab active" data-tab="all">All</button>
        <button class="friend-tab" data-tab="online">Online</button>
        <button class="friend-tab" data-tab="requests">Requests</button>
        <button class="friend-tab" data-tab="blocked">Blocked</button>
      </div>
      <div class="friend-list" id="friend-list">
        <!-- Populated dynamically -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- My Party -->
      <section class="section">
        <div class="section-header">
          <h3 class="section-title">My Party</h3>
          <button class="view-all-btn" id="create-party-btn">+ Create Party</button>
        </div>
        <div class="party-cards" id="my-party">
          <div class="party-card" id="no-party-card">
            <p style="color: #888; text-align: center; padding: 20px;">
              You're not in a party.<br/>
              <button class="party-btn primary" style="margin-top: 15px;" id="create-party-btn-2">Create Party</button>
            </p>
          </div>
        </div>
      </section>

      <!-- Party Invites -->
      <section class="section" id="invites-section" style="display: none;">
        <div class="section-header">
          <h3 class="section-title">Party Invites</h3>
          <span class="count" id="invite-count">0</span>
        </div>
        <div class="party-cards" id="party-invites">
          <!-- Populated dynamically -->
        </div>
      </section>

      <!-- Emotes -->
      <section class="section">
        <div class="section-header">
          <h3 class="section-title">Emotes</h3>
          <button class="view-all-btn">View All</button>
        </div>
        <div class="emote-grid" id="emote-grid">
          <!-- Populated dynamically -->
        </div>
      </section>
    </main>

    <!-- Notifications Panel -->
    <aside class="notifications-panel">
      <div class="panel-header">
        <h2>Notifications</h2>
        <span class="count" id="notif-count">0</span>
      </div>
      <div class="notification-list" id="notification-list">
        <!-- Populated dynamically -->
      </div>
      <div class="status-section">
        <div class="status-options">
          <button class="status-option active" data-status="online">
            <span class="icon">🟢</span>
            <span class="label">Online</span>
          </button>
          <button class="status-option" data-status="away">
            <span class="icon">🟡</span>
            <span class="label">Away</span>
          </button>
          <button class="status-option" data-status="busy">
            <span class="icon">🔴</span>
            <span class="label">Busy</span>
          </button>
          <button class="status-option" data-status="invisible">
            <span class="icon">⚫</span>
            <span class="label">Invisible</span>
          </button>
        </div>
        <input type="text" class="status-message-input" id="status-message" placeholder="Set a status message..." />
      </div>
    </aside>
  </div>

  <!-- Create Party Modal -->
  <div class="modal-overlay" id="create-party-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create Party</h3>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <div class="modal-field">
        <label>Party Name</label>
        <input type="text" id="party-name-input" placeholder="Enter party name..." />
      </div>
      <div class="modal-field">
        <label>Privacy</label>
        <select id="party-privacy-select">
          <option value="public">Public - Anyone can join</option>
          <option value="friends">Friends Only</option>
          <option value="invite">Invite Only</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Max Members</label>
        <select id="party-size-select">
          <option value="4">4 members</option>
          <option value="8">8 members</option>
          <option value="16">16 members</option>
          <option value="32">32 members</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-party">Cancel</button>
        <button class="modal-btn primary" id="confirm-party">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
