<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Shop - Hololand Example</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #shop-ui {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
      max-width: 300px;
    }
    #shop-info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
    }
    h2 {
      margin-top: 0;
      color: #4CAF50;
      font-size: 18px;
    }
    h3 {
      margin: 15px 0 10px 0;
      color: #81C784;
      font-size: 14px;
    }
    .product {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 3px solid #4CAF50;
    }
    .product-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .product-price {
      color: #81C784;
      font-size: 16px;
      margin: 5px 0;
    }
    .product-stock {
      color: #999;
      font-size: 12px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px 5px 5px 0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.3s;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .cart {
      background: rgba(76, 175, 80, 0.2);
      padding: 12px;
      margin-top: 15px;
      border-radius: 5px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 12px;
    }
    .total {
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      padding-top: 10px;
      margin-top: 10px;
      font-weight: bold;
      font-size: 16px;
    }
    .stat {
      margin: 8px 0;
      line-height: 1.6;
    }
    .success {
      background: rgba(76, 175, 80, 0.3);
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      border-left: 3px solid #4CAF50;
    }
    .error {
      background: rgba(244, 67, 54, 0.3);
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      border-left: 3px solid #f44336;
    }
  </style>
</head>
<body>
  <div id="shop-info">
    <h2>🏪 Tech VR Store</h2>
    <div class="stat">👤 Owner: TechVendor</div>
    <div class="stat">📦 Total Products: <span id="product-count">0</span></div>
    <div class="stat">💰 Total Revenue: $<span id="revenue">0</span></div>
    <div class="stat">🛒 Transactions: <span id="transaction-count">0</span></div>
  </div>

  <div id="shop-ui">
    <h2>🛍️ Products</h2>
    <div id="products"></div>

    <div class="cart">
      <h3>🛒 Your Cart</h3>
      <div id="cart-items">Empty</div>
      <div class="total">
        Total: $<span id="cart-total">0.00</span>
      </div>
      <button onclick="checkout()" id="checkout-btn" disabled>💳 Checkout</button>
      <button onclick="clearCart()">🗑️ Clear Cart</button>
    </div>

    <div id="message"></div>
  </div>

  <canvas id="canvas"></canvas>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/webxr/VRButton.js';
    import { TextGeometry } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/geometries/TextGeometry.js';
    import { FontLoader } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/loaders/FontLoader.js';

    // Setup scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Setup camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);

    // Setup renderer
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('canvas'),
      antialias: true,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.xr.enabled = true;
    document.body.appendChild(VRButton.createButton(renderer));

    // Orbit controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const spotlight1 = new THREE.SpotLight(0xffffff, 1);
    spotlight1.position.set(5, 10, 5);
    spotlight1.castShadow = true;
    scene.add(spotlight1);

    const spotlight2 = new THREE.SpotLight(0xffffff, 1);
    spotlight2.position.set(-5, 10, 5);
    spotlight2.castShadow = true;
    scene.add(spotlight2);

    // Ground
    const groundGeometry = new THREE.PlaneGeometry(30, 30);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x2c2c3e,
      roughness: 0.8,
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Shop building
    const shopWall = new THREE.BoxGeometry(15, 6, 0.5);
    const wallMaterial = new THREE.MeshStandardMaterial({
      color: 0x8b4513,
      roughness: 0.9,
    });

    // Back wall
    const backWall = new THREE.Mesh(shopWall, wallMaterial);
    backWall.position.set(0, 3, -7);
    backWall.castShadow = true;
    backWall.receiveShadow = true;
    scene.add(backWall);

    // Side walls
    const sideWall = new THREE.BoxGeometry(0.5, 6, 14);
    const leftWall = new THREE.Mesh(sideWall, wallMaterial);
    leftWall.position.set(-7, 3, 0);
    leftWall.castShadow = true;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(sideWall, wallMaterial);
    rightWall.position.set(7, 3, 0);
    rightWall.castShadow = true;
    scene.add(rightWall);

    // Counter
    const counterGeometry = new THREE.BoxGeometry(8, 1.5, 2);
    const counterMaterial = new THREE.MeshStandardMaterial({
      color: 0x654321,
      roughness: 0.7,
    });
    const counter = new THREE.Mesh(counterGeometry, counterMaterial);
    counter.position.set(0, 0.75, 3);
    counter.castShadow = true;
    counter.receiveShadow = true;
    scene.add(counter);

    // Product displays
    const productPositions = [
      { x: -4, z: -3 },
      { x: -2, z: -3 },
      { x: 0, z: -3 },
      { x: 2, z: -3 },
      { x: 4, z: -3 },
    ];

    // Simple Shop System
    class Shop {
      constructor(config) {
        this.id = config.id;
        this.name = config.name;
        this.ownerId = config.ownerId;
        this.inventory = new Map();
        this.transactions = [];
        this.revenue = 0;
      }

      addItem(item) {
        this.inventory.set(item.id, {
          ...item,
          quantity: item.quantity || 0,
        });
      }

      purchase(buyerId, itemId, quantity = 1) {
        const item = this.inventory.get(itemId);

        if (!item) {
          return { success: false, message: 'Item not found' };
        }

        if (item.quantity < quantity) {
          return { success: false, message: 'Insufficient stock' };
        }

        const totalPrice = item.price * quantity;

        // Update inventory
        item.quantity -= quantity;

        // Record transaction
        const transaction = {
          id: `txn-${Date.now()}`,
          buyerId,
          itemId,
          quantity,
          totalPrice,
          timestamp: Date.now(),
        };

        this.transactions.push(transaction);
        this.revenue += totalPrice;

        return {
          success: true,
          transaction,
          message: `Purchased ${quantity}x ${item.name}`,
        };
      }

      getInventory() {
        return Array.from(this.inventory.values());
      }

      getRevenue() {
        return this.revenue;
      }
    }

    // Create shop
    const shop = new Shop({
      id: 'tech-store-1',
      name: 'Tech VR Store',
      ownerId: 'vendor-123',
    });

    // Add products
    const products = [
      {
        id: 'vr-headset',
        name: 'VR Headset Pro',
        price: 399.99,
        quantity: 5,
        description: 'Premium VR experience',
        color: 0x2196F3,
      },
      {
        id: 'controllers',
        name: 'VR Controllers',
        price: 99.99,
        quantity: 10,
        description: 'Precision tracking',
        color: 0x4CAF50,
      },
      {
        id: 'haptic-vest',
        name: 'Haptic Vest',
        price: 299.99,
        quantity: 3,
        description: 'Feel every moment',
        color: 0xFF9800,
      },
      {
        id: 'wireless-adapter',
        name: 'Wireless Adapter',
        price: 149.99,
        quantity: 8,
        description: 'Cut the cord',
        color: 0x9C27B0,
      },
      {
        id: 'vr-treadmill',
        name: 'VR Treadmill',
        price: 1299.99,
        quantity: 2,
        description: 'Walk anywhere',
        color: 0xF44336,
      },
    ];

    products.forEach((product, index) => {
      shop.addItem(product);

      // Create 3D product display
      const pedestal = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
      const pedestalMaterial = new THREE.MeshStandardMaterial({
        color: 0x444444,
        metalness: 0.8,
        roughness: 0.2,
      });
      const pedestalMesh = new THREE.Mesh(pedestal, pedestalMaterial);
      pedestalMesh.position.set(
        productPositions[index].x,
        0.1,
        productPositions[index].z
      );
      pedestalMesh.receiveShadow = true;
      scene.add(pedestalMesh);

      // Product representation
      const productGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const productMaterial = new THREE.MeshStandardMaterial({
        color: product.color,
        metalness: 0.5,
        roughness: 0.3,
      });
      const productMesh = new THREE.Mesh(productGeometry, productMaterial);
      productMesh.position.set(
        productPositions[index].x,
        0.7,
        productPositions[index].z
      );
      productMesh.castShadow = true;
      productMesh.receiveShadow = true;
      scene.add(productMesh);

      // Animate product
      productMesh.userData.rotationSpeed = 0.5 + Math.random() * 0.5;
    });

    // Cart system
    const cart = new Map();

    function renderProducts() {
      const productsDiv = document.getElementById('products');
      const inventory = shop.getInventory();

      productsDiv.innerHTML = inventory.map(item => `
        <div class="product">
          <div class="product-name">${item.name}</div>
          <div class="product-price">$${item.price.toFixed(2)}</div>
          <div class="product-stock">Stock: ${item.quantity}</div>
          <button onclick="addToCart('${item.id}')" ${item.quantity === 0 ? 'disabled' : ''}>
            🛒 Add to Cart
          </button>
        </div>
      `).join('');

      // Update stats
      document.getElementById('product-count').textContent = inventory.length;
      document.getElementById('revenue').textContent = shop.getRevenue().toFixed(2);
      document.getElementById('transaction-count').textContent = shop.transactions.length;
    }

    window.addToCart = function(itemId) {
      const item = shop.inventory.get(itemId);
      if (!item || item.quantity === 0) return;

      const currentQty = cart.get(itemId) || 0;

      if (currentQty < item.quantity) {
        cart.set(itemId, currentQty + 1);
        renderCart();
        showMessage(`Added ${item.name} to cart`, 'success');
      } else {
        showMessage('Not enough stock', 'error');
      }
    };

    function renderCart() {
      const cartItemsDiv = document.getElementById('cart-items');
      const checkoutBtn = document.getElementById('checkout-btn');

      if (cart.size === 0) {
        cartItemsDiv.innerHTML = 'Empty';
        document.getElementById('cart-total').textContent = '0.00';
        checkoutBtn.disabled = true;
        return;
      }

      let total = 0;
      const items = [];

      cart.forEach((quantity, itemId) => {
        const item = shop.inventory.get(itemId);
        const subtotal = item.price * quantity;
        total += subtotal;

        items.push(`
          <div class="cart-item">
            <span>${item.name} x${quantity}</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
        `);
      });

      cartItemsDiv.innerHTML = items.join('');
      document.getElementById('cart-total').textContent = total.toFixed(2);
      checkoutBtn.disabled = false;
    }

    window.clearCart = function() {
      cart.clear();
      renderCart();
      showMessage('Cart cleared', 'success');
    };

    window.checkout = function() {
      const purchases = [];
      let allSuccess = true;

      cart.forEach((quantity, itemId) => {
        const result = shop.purchase('customer-456', itemId, quantity);
        purchases.push(result);
        if (!result.success) {
          allSuccess = false;
        }
      });

      if (allSuccess) {
        showMessage('✅ Purchase successful! Thank you for shopping.', 'success');
        cart.clear();
        renderCart();
        renderProducts();
      } else {
        showMessage('❌ Some items could not be purchased', 'error');
      }
    };

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.className = type;
      messageDiv.textContent = text;
      messageDiv.style.display = 'block';

      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 3000);
    }

    // Initialize UI
    renderProducts();
    renderCart();

    // Animation loop
    renderer.setAnimationLoop((time) => {
      // Rotate products
      scene.children.forEach(child => {
        if (child.userData.rotationSpeed) {
          child.rotation.y += child.userData.rotationSpeed * 0.01;
        }
      });

      controls.update();
      renderer.render(scene, camera);
    });

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
