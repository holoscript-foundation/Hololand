<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hololand - Collaborative Building</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      grid-template-rows: 60px 1fr 200px;
      height: 100vh;
      gap: 1px;
      background: #2a2a4a;
    }

    .header {
      grid-column: 1 / -1;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #3a3a5a;
    }

    .header h1 {
      font-size: 1.4rem;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected { background: #4ade80; }
    .status-dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .toolbar {
      background: #1a1a2e;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .toolbar h3 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid transparent;
      border-radius: 8px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .tool-btn.active {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
      color: #667eea;
    }

    .tool-btn .icon {
      font-size: 1.2rem;
    }

    .canvas-container {
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }

    #build-canvas {
      width: 100%;
      height: 100%;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .collaborators {
      background: #1a1a2e;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .collaborators h3 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .collaborator-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .collaborator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }

    .collaborator-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
    }

    .collaborator-info {
      flex: 1;
      min-width: 0;
    }

    .collaborator-name {
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .collaborator-action {
      font-size: 0.75rem;
      color: #888;
    }

    .cursor-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .object-list {
      background: #1a1a2e;
      padding: 15px;
      overflow-y: auto;
    }

    .object-list h3 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .scene-tree {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .scene-object {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .scene-object:hover {
      background: rgba(255,255,255,0.08);
    }

    .scene-object.selected {
      background: rgba(102, 126, 234, 0.2);
      border-left: 2px solid #667eea;
    }

    .scene-object.locked {
      opacity: 0.5;
    }

    .scene-object .type-icon {
      font-size: 1rem;
    }

    .scene-object .name {
      flex: 1;
      font-size: 0.85rem;
    }

    .scene-object .owner {
      font-size: 0.7rem;
      padding: 2px 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .properties {
      background: #1a1a2e;
      padding: 15px;
      overflow-y: auto;
    }

    .properties h3 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .property-group {
      margin-bottom: 15px;
    }

    .property-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 5px;
    }

    .property-row {
      display: flex;
      gap: 8px;
    }

    .property-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      font-size: 0.85rem;
    }

    .property-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .color-picker {
      width: 40px;
      height: 36px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .history-panel {
      grid-column: 1 / 2;
      background: #1a1a2e;
      padding: 15px;
      overflow-y: auto;
    }

    .history-panel h3 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .history-item .action {
      color: #667eea;
    }

    .history-item .user {
      color: #888;
    }

    .history-item .time {
      margin-left: auto;
      color: #555;
      font-size: 0.7rem;
    }

    .chat-panel {
      grid-column: 2 / 4;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-message .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .chat-message .content {
      flex: 1;
    }

    .chat-message .sender {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .chat-message .text {
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.4;
    }

    .chat-message.system {
      justify-content: center;
      color: #888;
      font-size: 0.8rem;
      font-style: italic;
    }

    .chat-input-container {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid #2a2a4a;
    }

    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 10px 15px;
      color: #fff;
      font-size: 0.9rem;
    }

    .chat-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .send-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    /* Remote cursors */
    .remote-cursor {
      position: absolute;
      pointer-events: none;
      z-index: 1000;
      transition: all 0.1s linear;
    }

    .remote-cursor .cursor-icon {
      width: 20px;
      height: 20px;
      transform: rotate(-45deg);
    }

    .remote-cursor .cursor-label {
      position: absolute;
      top: 20px;
      left: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Collaborative Building</h1>
      <div class="connection-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
        <span id="player-count">(0 builders)</span>
      </div>
    </header>

    <aside class="toolbar">
      <h3>Tools</h3>
      <div class="tool-group">
        <button class="tool-btn active" data-tool="select">
          <span class="icon">👆</span>
          <span>Select</span>
        </button>
        <button class="tool-btn" data-tool="move">
          <span class="icon">✋</span>
          <span>Move</span>
        </button>
        <button class="tool-btn" data-tool="rotate">
          <span class="icon">🔄</span>
          <span>Rotate</span>
        </button>
        <button class="tool-btn" data-tool="scale">
          <span class="icon">📐</span>
          <span>Scale</span>
        </button>
      </div>

      <h3>Primitives</h3>
      <div class="tool-group">
        <button class="tool-btn" data-create="cube">
          <span class="icon">🧊</span>
          <span>Cube</span>
        </button>
        <button class="tool-btn" data-create="sphere">
          <span class="icon">🔵</span>
          <span>Sphere</span>
        </button>
        <button class="tool-btn" data-create="cylinder">
          <span class="icon">🛢️</span>
          <span>Cylinder</span>
        </button>
        <button class="tool-btn" data-create="plane">
          <span class="icon">▫️</span>
          <span>Plane</span>
        </button>
      </div>

      <h3>Actions</h3>
      <div class="tool-group">
        <button class="tool-btn" id="btn-duplicate">
          <span class="icon">📋</span>
          <span>Duplicate</span>
        </button>
        <button class="tool-btn" id="btn-delete">
          <span class="icon">🗑️</span>
          <span>Delete</span>
        </button>
        <button class="tool-btn" id="btn-lock">
          <span class="icon">🔒</span>
          <span>Lock</span>
        </button>
      </div>
    </aside>

    <main class="canvas-container">
      <canvas id="build-canvas"></canvas>
      <div class="grid-overlay"></div>
      <div id="remote-cursors"></div>
    </main>

    <aside class="collaborators">
      <h3>Collaborators</h3>
      <div class="collaborator-list" id="collaborator-list">
        <!-- Populated dynamically -->
      </div>

      <h3 style="margin-top: auto;">Scene Objects</h3>
      <div class="scene-tree" id="scene-tree">
        <!-- Populated dynamically -->
      </div>
    </aside>

    <section class="history-panel">
      <h3>History</h3>
      <div class="history-list" id="history-list">
        <!-- Populated dynamically -->
      </div>
    </section>

    <section class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-message system">
          Welcome to Collaborative Building! Create and edit objects together in real-time.
        </div>
      </div>
      <div class="chat-input-container">
        <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." />
        <button class="send-btn" id="send-btn">Send</button>
      </div>
    </section>

    <aside class="properties">
      <h3>Properties</h3>
      <div id="properties-content">
        <p style="color: #666; font-size: 0.85rem;">Select an object to edit its properties</p>
      </div>
    </aside>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
